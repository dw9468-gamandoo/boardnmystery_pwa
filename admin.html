<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 보드앤미스터리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 20px; }
    h2 { font-size: 15px; color: #aaa; margin: 20px 0 10px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; border-bottom: 1px solid #222; padding-bottom: 16px; }
    .nav-btn { padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #333; background: transparent; color: #888; }
    .nav-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 600; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: #1a1a1a; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .nickname { font-size: 16px; font-weight: 600; }
    .meta { font-size: 12px; color: #666; margin: 4px 0; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .btn { padding: 7px 14px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-white { background: #fff; color: #000; }
    .btn-green { background: #1a7a3c; color: #fff; }
    .btn-red { background: #7a1a1a; color: #fff; }
    .btn-yellow { background: #7a5a00; color: #fff; }
    .btn-blue { background: #1a4a7a; color: #fff; }
    .btn-gray { background: #333; color: #aaa; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; }
    .badge-pending { background: #3a3000; color: #ffcc00; }
    .badge-active { background: #003a1a; color: #00ff88; }
    .badge-suspended { background: #3a0000; color: #ff6666; }
    .count-badge { display: inline-block; background: #ff4444; color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 4px; }
    input, select, textarea { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; margin-bottom: 8px; }
    textarea { height: 80px; resize: vertical; }
    .form-row { display: flex; gap: 8px; }
    .form-row input, .form-row select { margin-bottom: 8px; }
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #1a1a1a; border-radius: 10px; padding: 16px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
    .empty { color: #555; text-align: center; padding: 40px; font-size: 14px; }
    .login-box { max-width: 320px; margin: 80px auto; text-align: center; }
    .login-box h1 { margin-bottom: 24px; }
    .msg { color: #ff6b6b; font-size: 13px; margin-top: 8px; text-align: center; }
    .search-bar { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h1>관리자 로그인</h1>
  <input type="email" id="adminEmail" placeholder="이메일" />
  <input type="password" id="adminPw" placeholder="비밀번호" />
  <button class="btn btn-white" style="width:100%;padding:12px;font-size:15px" onclick="adminLogin()">로그인</button>
  <div class="msg" id="loginMsg"></div>
</div>

<div id="adminMain" style="display:none;">
  <h1>보드앤미스터리 관리자</h1>
  <div class="nav">
    <button class="nav-btn active" onclick="showSection('dashboard',this)">📊 대시보드</button>
    <button class="nav-btn" onclick="showSection('pending',this)">승인대기 <span class="count-badge" id="pendingCount">0</span></button>
    <button class="nav-btn" onclick="showSection('members',this)">👥 회원관리</button>
    <button class="nav-btn" onclick="showSection('games',this)">🎲 게임관리</button>
    <button class="nav-btn" onclick="showSection('badges',this)">🏅 뱃지관리</button>
    <button class="nav-btn" onclick="showSection('notices',this)">📢 공지사항</button>
  </div>

  <div class="section active" id="section-dashboard">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">전체 회원</div></div>
      <div class="stat-card"><div class="stat-num" id="statActive">-</div><div class="stat-label">정회원</div></div>
      <div class="stat-card"><div class="stat-num" id="statPending">-</div><div class="stat-label">승인 대기</div></div>
      <div class="stat-card"><div class="stat-num" id="statGames">-</div><div class="stat-label">등록 게임</div></div>
    </div>
    <h2>등급 분포</h2>
    <div class="stat-grid" id="gradeStats"></div>
  </div>

  <div class="section" id="section-pending">
    <div id="pendingList"></div>
  </div>

  <div class="section" id="section-members">
    <input class="search-bar" placeholder="닉네임 또는 이메일 검색" oninput="filterMembers(this.value)" />
    <div id="memberList"></div>
  </div>

  <div class="section" id="section-games">
  <!-- BGG 검색 -->
  <h2>BGG에서 게임 검색</h2>
    <div class="card">
      <div class="form-row">
        <input id="bggSearch" placeholder="게임 이름으로 검색 (영문 권장)" />
        <button class="btn btn-blue" style="white-space:nowrap" onclick="searchBGG()">검색</button>
      </div>
      <div id="bggResults"></div>
    </div>
  
    <!-- CSV 업로드 -->
    <h2>CSV 일괄 등록</h2>
    <div class="card">
      <div class="meta" style="margin-bottom:8px;color:#aaa">
        CSV 형식: name, nameKo, bggId, genre, series, seriesOrder, oneTime, link<br>
        1행은 헤더, 2행부터 데이터
      </div>
      <a href="#" onclick="downloadCSVTemplate()" style="color:#4af;font-size:13px">📥 CSV 템플릿 다운로드</a>
      <br><br>
      <input type="file" id="csvFile" accept=".csv" style="background:transparent;border:none;color:#aaa;padding:0" />
      <button class="btn btn-green" style="margin-top:8px" onclick="uploadCSV()">CSV 업로드</button>
      <div id="csvMsg" style="font-size:13px;margin-top:8px;color:#6bff9e"></div>
    </div>
  
    <!-- 수동 등록 -->
    <h2>수동 등록</h2>
    <div class="card">
      <input id="gName" placeholder="게임 이름 *" />
      <input id="gNameKo" placeholder="한국어 이름" />
      <input id="gBggId" placeholder="BGG ID (선택)" />
      <div class="form-row">
        <input id="gMinPlayers" placeholder="최소 인원" type="number" />
        <input id="gRecommended" placeholder="추천 인원 (예: 4,5)" />
        <input id="gMax" placeholder="최대 인원 *" type="number" />
      </div>
      <div class="form-row">
        <input id="gMinPlaytime" placeholder="최소 플레이시간(분)" type="number" />
        <input id="gMaxPlaytime" placeholder="최대 플레이시간(분)" type="number" />
      </div>
      <div class="form-row">
        <select id="gGenre">
          <option value="">장르 선택</option>
          <option>머더미스터리</option><option>협력</option><option>전략</option>
          <option>파티</option><option>추리</option><option>기타</option>
        </select>
        <select id="gDifficulty">
          <option value="">난이도</option>
          <option>입문</option><option>초급</option><option>중급</option><option>고급</option>
        </select>
      </div>
      <div class="form-row">
        <input id="gSeries" placeholder="시리즈명 (선택)" />
        <input id="gSeriesOrder" placeholder="시리즈 순서" type="number" />
      </div>
      <input id="gDesc" placeholder="설명" />
      <input id="gLink" placeholder="링크 (선택)" />
      <input id="gImage" placeholder="이미지 URL (선택)" />
      <select id="gOneTime">
        <option value="false">반복 플레이 가능</option>
        <option value="true">1회성 (머더미스터리 등)</option>
      </select>
      <button class="btn btn-green" style="margin-top:4px" onclick="addGame()">게임 등록</button>
    </div>
  
    <h2>등록된 게임 목록 (<span id="gameCount">0</span>개)</h2>
    <input class="search-bar" placeholder="게임 이름 검색" oninput="filterGames(this.value)" />
    <div id="gameList"></div>
  </div>

  <div class="section" id="section-badges">
    <h2>뱃지 등록</h2>
    <div class="card">
      <input id="bName" placeholder="뱃지 이름 *" />
      <input id="bIcon" placeholder="이모지 아이콘 (예: 🏅)" />
      <textarea id="bDesc" placeholder="뱃지 설명"></textarea>
      <input id="bCondition" placeholder="조건 설명 (예: 벙 10회 참여)" />
      <button class="btn btn-green" onclick="addBadge()">뱃지 등록</button>
    </div>
    <h2>등록된 뱃지</h2>
    <div id="badgeList"></div>
  </div>

  <div class="section" id="section-notices">
    <h2>공지 등록</h2>
    <div class="card">
      <input id="nTitle" placeholder="제목 *" />
      <textarea id="nContent" placeholder="내용 *"></textarea>
      <select id="nType">
        <option value="general">일반</option>
        <option value="important">중요</option>
        <option value="event">이벤트</option>
      </select>
      <button class="btn btn-green" onclick="addNotice()">공지 등록</button>
    </div>
    <h2>등록된 공지</h2>
    <div id="noticeList"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, addDoc,
           deleteDoc, increment, serverTimestamp, query, orderBy }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDEBj278FWgPBI91U6tcu1_eHIJKSQ1q0k",
    authDomain: "boardnmystery.firebaseapp.com",
    projectId: "boardnmystery",
    storageBucket: "boardnmystery.firebasestorage.app",
    messagingSenderId: "210410925391",
    appId: "1:210410925391:web:deb17ddf62e72d507be93a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ADMIN_EMAILS = ['dw9468@gmail.com'];
  let allUsers = [];

  window.adminLogin = async function() {
    const email = document.getElementById('adminEmail').value.trim();
    const pw = document.getElementById('adminPw').value;
    try {
      await signInWithEmailAndPassword(auth, email, pw);
    } catch(e) {
      document.getElementById('loginMsg').textContent = '로그인 실패';
    }
  };

  onAuthStateChanged(auth, async (user) => {
    if (user && ADMIN_EMAILS.includes(user.email)) {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminMain').style.display = 'block';
      loadAll();
    } else if (user) {
      document.getElementById('loginMsg').textContent = '관리자 권한이 없습니다.';
      await auth.signOut();
    }
  });

  async function loadAll() {
    await loadUsers();
    await loadGames();
    await loadBadges();
    await loadNotices();
  }

  async function loadUsers() {
    const snap = await getDocs(collection(db, 'users'));
    allUsers = [];
    snap.forEach(d => allUsers.push({ id: d.id, ...d.data() }));
    const pending = allUsers.filter(u => u.memberStatus === 'pending');
    document.getElementById('pendingCount').textContent = pending.length;
    document.getElementById('statTotal').textContent = allUsers.length;
    document.getElementById('statActive').textContent = allUsers.filter(u => u.memberStatus === 'active').length;
    document.getElementById('statPending').textContent = pending.length;
    const grades = ['어색','익숙','친한','편한'];
    document.getElementById('gradeStats').innerHTML = grades.map(g => {
      const cnt = allUsers.filter(u => u.grade === g).length;
      return `<div class="stat-card"><div class="stat-num">${cnt}</div><div class="stat-label">${g}</div></div>`;
    }).join('');
    renderPending(pending);
    renderMembers(allUsers);
  }

    function renderPending(users) {
    const el = document.getElementById('pendingList');
    if (!users.length) { el.innerHTML = '<div class="empty">승인 대기 중인 회원이 없습니다.</div>'; return; }
    el.innerHTML = users.map(u => `
      <div class="card">
        <div class="card-header">
          <span class="nickname">${u.nickname}</span>
          <span class="badge badge-pending">대기중</span>
        </div>
        <div class="meta">${u.email}</div>
        <div class="meta">📞 ${u.phone || '-'}</div>
        <div class="meta">가입일: ${u.joinDate ? u.joinDate.substring(0,10) : '-'}</div>
        <div class="actions">
          <button class="btn btn-green" onclick="approveUser('${u.id}')">✅ 승인</button>
          <button class="btn btn-red" onclick="rejectUser('${u.id}')">❌ 거절</button>
        </div>
      </div>`).join('');
  }

  function renderMembers(users) {
    const el = document.getElementById('memberList');
    if (!users.length) { el.innerHTML = '<div class="empty">회원이 없습니다.</div>'; return; }
    el.innerHTML = users.map(u => `
      <div class="card">
        <div class="card-header">
          <span class="nickname">${u.nickname}</span>
          <span class="badge badge-${u.memberStatus || 'pending'}">${{pending:'대기',active:'정회원',suspended:'정지'}[u.memberStatus]||'대기'}</span>
        </div>
        <div class="meta">${u.email} | 📞 ${u.phone || '-'}</div>
        <div class="meta">등급: ${u.grade||'어색'} | 포인트: ${u.point||0}P | 경고: ${u.warnCount||0}회</div>
        <div class="actions">
          ${u.memberStatus !== 'active' ? `<button class="btn btn-blue" onclick="approveUser('${u.id}')">✅ 활성화</button>` : ''}
          ${u.memberStatus !== 'suspended' ? `<button class="btn btn-red" onclick="suspendUser('${u.id}')">🚫 정지</button>` : ''}
          <button class="btn btn-yellow" onclick="warnUser('${u.id}')">⚠️ 경고</button>
          <button class="btn btn-green" onclick="openPointModal('${u.id}','${u.nickname}')">💰 포인트</button>
          <button class="btn btn-gray" onclick="changeGrade('${u.id}','${u.grade||'어색'}')">🎖 등급변경</button>
        </div>
      </div>`).join('');
  }

  window.filterMembers = function(val) {
    const filtered = allUsers.filter(u =>
      u.nickname?.includes(val) || u.email?.includes(val)
    );
    renderMembers(filtered);
  };

  window.approveUser = async function(uid) {
    await updateDoc(doc(db, 'users', uid), { memberStatus: 'active' });
    alert('승인 완료'); loadUsers();
  };

  window.rejectUser = async function(uid) {
    if (!confirm('거절하시겠습니까?')) return;
    await updateDoc(doc(db, 'users', uid), { memberStatus: 'suspended' });
    alert('거절 완료'); loadUsers();
  };

  window.suspendUser = async function(uid) {
    if (!confirm('정지하시겠습니까?')) return;
    await updateDoc(doc(db, 'users', uid), { memberStatus: 'suspended' });
    alert('정지 완료'); loadUsers();
  };

  window.warnUser = async function(uid) {
    if (!confirm('경고 1회 부여하시겠습니까?')) return;
    const userRef = doc(db, 'users', uid);
    await updateDoc(userRef, { warnCount: increment(1) });
    const snap = await getDocs(collection(db, 'users'));
    const user = snap.docs.find(d => d.id === uid)?.data();
    if (user && (user.warnCount || 0) >= 3) {
      await updateDoc(userRef, { memberStatus: 'suspended' });
      alert('경고 3회 누적 — 자동 정지 처리됨');
    } else {
      alert('경고 부여 완료');
    }
    loadUsers();
  };

  window.openPointModal = function(uid, nickname) {
    const amount = prompt(`${nickname}님 포인트 지급/차감\n양수: 지급, 음수: 차감\n예) 1000 또는 -500`);
    if (amount === null || amount === '') return;
    const num = parseInt(amount);
    if (isNaN(num)) { alert('숫자를 입력해주세요.'); return; }
    const reason = prompt('사유를 입력해주세요.') || '관리자 수동 조정';
    adjustPoint(uid, num, reason);
  };

  async function adjustPoint(uid, amount, reason) {
    await updateDoc(doc(db, 'users', uid), { point: increment(amount) });
    await addDoc(collection(db, 'pointLog'), {
      uid, amount, reason,
      type: amount > 0 ? 'earn' : 'use',
      timestamp: serverTimestamp()
    });
    alert(`포인트 ${amount > 0 ? '+' : ''}${amount} 처리 완료`);
    loadUsers();
  }

  window.changeGrade = async function(uid, currentGrade) {
    const grades = ['어색', '익숙', '친한', '편한'];
    const grade = prompt(`등급 변경\n현재: ${currentGrade}\n입력: 어색 / 익숙 / 친한 / 편한`);
    if (!grade || !grades.includes(grade)) { alert('올바른 등급을 입력해주세요.'); return; }
    await updateDoc(doc(db, 'users', uid), { grade });
    await addDoc(collection(db, 'gradeLog'), {
      uid, fromGrade: currentGrade, toGrade: grade,
      reason: '관리자 수동 변경',
      timestamp: serverTimestamp()
    });
    alert('등급 변경 완료'); loadUsers();
  };

    // ── 게임 ──
  let allGames = [];

  async function loadGames() {
    const snap = await getDocs(query(collection(db, 'games'), orderBy('name')));
    allGames = [];
    snap.forEach(d => allGames.push({ id: d.id, ...d.data() }));
    document.getElementById('statGames').textContent = allGames.length;
    document.getElementById('gameCount').textContent = allGames.length;
    renderGames(allGames);
  }

  function renderGames(games) {
    const el = document.getElementById('gameList');
    if (!games.length) { el.innerHTML = '<div class="empty">등록된 게임이 없습니다.</div>'; return; }
    el.innerHTML = games.map(g => `
      <div class="card">
        <div class="card-header">
          <span class="nickname">${g.nameKo || g.name}</span>
          <span style="font-size:11px;color:#666">${g.genre||''}</span>
        </div>
        ${g.image ? `<img src="${g.thumbnail||g.image}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;margin-bottom:6px">` : ''}
        <div class="meta">${g.name} ${g.bggId ? `| BGG: ${g.bggId}` : ''}</div>
        <div class="meta">${g.minPlayers||'-'}~${g.maxPlayers||g.max||'-'}명 | ${g.minPlaytime||'-'}~${g.maxPlaytime||'-'}분 | 난이도: ${g.difficulty||'-'}</div>
        <div class="meta">시리즈: ${g.series||'-'} | ${g.oneTime ? '1회성' : '반복'}</div>
        <div class="actions">
          <button class="btn btn-red" onclick="deleteGame('${g.id}')">🗑 삭제</button>
        </div>
      </div>`).join('');
  }

  window.filterGames = function(val) {
    const filtered = allGames.filter(g =>
      (g.name||'').toLowerCase().includes(val.toLowerCase()) ||
      (g.nameKo||'').includes(val)
    );
    renderGames(filtered);
  };

  // BGG 검색
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwzgw3ZiG1dFNHvQUGUeTuVIHb31mlJX_DsERonnkyxiXREOGHbGaJB9oHMwBOzoUYB2w/exec';

  window.searchBGG = async function() {
    const query_str = document.getElementById('bggSearch').value.trim();
    if (!query_str) return;
    const el = document.getElementById('bggResults');
    el.innerHTML = '<div style="color:#888;font-size:13px;margin-top:8px">검색 중...</div>';
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=searchBGG&query=${encodeURIComponent(query_str)}`);
      const data = await res.json();
      if (!data.results || !data.results.length) {
        el.innerHTML = '<div style="color:#888;font-size:13px;margin-top:8px">검색 결과가 없습니다.</div>';
        return;
      }
      el.innerHTML = data.results.map(r => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #222">
          <div>
            <div style="font-size:14px">${r.name}</div>
            <div style="font-size:12px;color:#666">${r.year} | BGG ID: ${r.id}</div>
          </div>
          <button class="btn btn-blue" onclick="fetchBGGDetail('${r.id}','${r.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">가져오기</button>
        </div>`).join('');
    } catch(e) {
      el.innerHTML = '<div style="color:#ff6b6b;font-size:13px;margin-top:8px">검색 실패: ' + e.message + '</div>';
    }
  };

  window.fetchBGGDetail = async function(bggId, name) {

              <div style="font-size:12px;color:#888">${gameData.minPlaytime}~${gameData.maxPlaytime}분 | BGG 평점: ${gameData.bggRating} | 복잡도: ${gameData.bggComplexity}</div>
              <div style="font-size:12px;color:#888">자동 난이도: ${gameData.difficulty}</div>
            </div>
          </div>
          <div style="margin-top:12px">
            <input id="bgg_nameKo" placeholder="한국어 이름" style="margin-bottom:8px" />
            <select id="bgg_genre" style="margin-bottom:8px">
              <option value="">장르 선택 *</option>
              <option>머더미스터리</option><option>협력</option><option>전략</option>
              <option>파티</option><option>추리</option><option>기타</option>
            </select>
            <div class="form-row">
              <input id="bgg_series" placeholder="시리즈명 (선택)" />
              <input id="bgg_seriesOrder" placeholder="시리즈 순서" type="number" />
            </div>
            <select id="bgg_oneTime" style="margin-bottom:8px">
              <option value="false">반복 플레이 가능</option>
              <option value="true">1회성 (머더미스터리 등)</option>
            </select>
          </div>
          <button class="btn btn-green" id="saveBggBtn">✅ 이 게임 등록</button>
        </div>`;

      gameData.image = imgFull;
      gameData.thumbnail = imgThumb;
      document.getElementById('saveBggBtn').onclick = () => saveBGGGame(gameData);
    } catch(e) {
      el.innerHTML = '<div style="color:#ff6b6b;font-size:13px;margin-top:8px">상세 정보 로드 실패: ' + e.message + '</div>';
    }
  };

    window.saveBGGGame = async function(gameData) {
    gameData.nameKo = document.getElementById('bgg_nameKo').value.trim();
    gameData.genre = document.getElementById('bgg_genre').value;
    gameData.series = document.getElementById('bgg_series').value.trim();
    gameData.seriesOrder = parseInt(document.getElementById('bgg_seriesOrder').value) || 0;
    gameData.oneTime = document.getElementById('bgg_oneTime').value === 'true';
    gameData.createdAt = serverTimestamp();
    await addDoc(collection(db, 'games'), gameData);
    document.getElementById('bggResults').innerHTML = '<div style="color:#6bff9e;font-size:13px;margin-top:8px">✅ 등록 완료!</div>';
    document.getElementById('bggSearch').value = '';
    loadGames();
  };

  // CSV 업로드
    window.downloadCSVTemplate = function() {
    const BOM = '\uFEFF';
    const header = 'name,nameKo,bggId,genre,series,seriesOrder,oneTime,link';
    const example = '판도라의상자,판도라의 상자,12345,머더미스터리,,1,true,https://example.com';
    const csv = BOM + header + '\n' + example;
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'games_template.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    return false;
  };

  window.uploadCSV = async function() {
    const file = document.getElementById('csvFile').files[0];
    const msgEl = document.getElementById('csvMsg');
    if (!file) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = '파일을 선택해주세요.'; return; }

    const text = await file.text();
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim());
    const rows = lines.slice(1);

    if (!rows.length) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = '데이터가 없습니다.'; return; }

    msgEl.style.color = '#aaa';
    msgEl.textContent = `${rows.length}개 처리 중...`;

    let success = 0, fail = 0;
    for (const row of rows) {
      if (!row.trim()) continue;
      const vals = row.split(',').map(v => v.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = vals[i] || '');

      if (!obj.name) { fail++; continue; }

      try {
        await addDoc(collection(db, 'games'), {
          name: obj.name,
          nameKo: obj.nameKo || '',
          bggId: obj.bggId || '',
          genre: obj.genre || '',
          series: obj.series || '',
          seriesOrder: parseInt(obj.seriesOrder) || 0,
          oneTime: obj.oneTime === 'true',
          link: obj.link || '',
          minPlayers: 0, maxPlayers: 0,
          minPlaytime: 0, maxPlaytime: 0,
          difficulty: '', image: '', thumbnail: '',
          bggRating: 0, rating: 0, ratingCount: 0,
          createdAt: serverTimestamp()
        });
        success++;
      } catch(e) { fail++; }
    }

    msgEl.style.color = '#6bff9e';
    msgEl.textContent = `완료: ${success}개 등록, ${fail}개 실패`;
    document.getElementById('csvFile').value = '';
    loadGames();
  };

  window.addGame = async function() {
    const name = document.getElementById('gName').value.trim();
    const max = document.getElementById('gMax').value;
    if (!name || !max) { alert('게임 이름과 최대 인원은 필수입니다.'); return; }
    await addDoc(collection(db, 'games'), {
      name,
      nameKo: document.getElementById('gNameKo').value.trim(),
      bggId: document.getElementById('gBggId').value.trim(),
      minPlayers: parseInt(document.getElementById('gMinPlayers').value) || 0,
      maxPlayers: parseInt(max),
      recommendedPlayers: document.getElementById('gRecommended').value.trim(),
      minPlaytime: parseInt(document.getElementById('gMinPlaytime').value) || 0,
      maxPlaytime: parseInt(document.getElementById('gMaxPlaytime').value) || 0,
      genre: document.getElementById('gGenre').value,
      difficulty: document.getElementById('gDifficulty').value,
      series: document.getElementById('gSeries').value.trim(),
      seriesOrder: parseInt(document.getElementById('gSeriesOrder').value) || 0,
      desc: document.getElementById('gDesc').value.trim(),
      link: document.getElementById('gLink').value.trim(),
      image: document.getElementById('gImage').value.trim(),
      thumbnail: document.getElementById('gImage').value.trim(),
      oneTime: document.getElementById('gOneTime').value === 'true',
      bggRating: 0, rating: 0, ratingCount: 0,
      createdAt: serverTimestamp()
    });
    ['gName','gNameKo','gBggId','gMinPlayers','gMax','gMinPlaytime',
     'gMaxPlaytime','gSeries','gSeriesOrder','gDesc','gLink','gImage','gRecommended']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('gGenre').value = '';
    document.getElementById('gDifficulty').value = '';
    document.getElementById('gOneTime').value = 'false';
    alert('게임 등록 완료');
    loadGames();
  };

  window.deleteGame = async function(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    await deleteDoc(doc(db, 'games', id));
    alert('삭제 완료');
    loadGames();
  };

  // ── 뱃지 ──
  async function loadBadges() {
    const snap = await getDocs(collection(db, 'badges'));
    const badges = [];
    snap.forEach(d => badges.push({ id: d.id, ...d.data() }));
    document.getElementById('badgeList').innerHTML = badges.length ? badges.map(b => `
      <div class="card">
        <div class="card-header">
          <span class="nickname">${b.icon||'🏅'} ${b.name}</span>
          <button class="btn btn-red" onclick="deleteBadge('${b.id}')">🗑</button>
        </div>
        <div class="meta">${b.desc||''}</div>
        <div class="meta">조건: ${b.condition||'-'}</div>
      </div>`).join('') : '<div class="empty">등록된 뱃지가 없습니다.</div>';
  }

  window.addBadge = async function() {
    const name = document.getElementById('bName').value.trim();
    if (!name) { alert('뱃지 이름은 필수입니다.'); return; }
    await addDoc(collection(db, 'badges'), {
      name,
      icon: document.getElementById('bIcon').value,
      desc: document.getElementById('bDesc').value,
      condition: document.getElementById('bCondition').value,
      createdAt: serverTimestamp()
    });
    ['bName','bIcon','bDesc','bCondition'].forEach(id => document.getElementById(id).value = '');
    alert('뱃지 등록 완료'); loadBadges();
  };

  window.deleteBadge = async function(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    await deleteDoc(doc(db, 'badges', id));
    alert('삭제 완료'); loadBadges();
  };

  // ── 공지사항 ──
  async function loadNotices() {
    const snap = await getDocs(query(collection(db, 'notices'), orderBy('createdAt', 'desc')));
    const notices = [];
    snap.forEach(d => notices.push({ id: d.id, ...d.data() }));
    document.getElementById('noticeList').innerHTML = notices.length ? notices.map(n => `
      <div class="card">
        <div class="card-header">
          <span class="nickname">${n.title}</span>
          <span style="font-size:11px;color:#666">${{general:'일반',important:'중요',event:'이벤트'}[n.type]||''}</span>
        </div>
        <div class="meta">${n.content}</div>
        <div class="actions">
          <button class="btn btn-red" onclick="deleteNotice('${n.id}')">🗑 삭제</button>
        </div>
      </div>`).join('') : '<div class="empty">등록된 공지가 없습니다.</div>';
  }

  window.addNotice = async function() {
    const title = document.getElementById('nTitle').value.trim();
    const content = document.getElementById('nContent').value.trim();
    if (!title || !content) { alert('제목과 내용은 필수입니다.'); return; }
    await addDoc(collection(db, 'notices'), {
      title, content,
      type: document.getElementById('nType').value,
      createdAt: serverTimestamp()
    });
    ['nTitle','nContent'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('nType').value = 'general';
    alert('공지 등록 완료'); loadNotices();
  };

  window.deleteNotice = async function(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    await deleteDoc(doc(db, 'notices', id));
    alert('삭제 완료'); loadNotices();
  };

  // ── 네비게이션 ──
  window.showSection = function(name, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    btn.classList.add('active');
  };

</script>
