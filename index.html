<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보드앤미스터리</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-box {
      text-align: center;
      padding: 40px 24px;
      width: 100%;
      max-width: 360px;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 48px;
      line-height: 1.5;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      min-height: 52px;
      padding: 14px 24px;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .google-btn:hover { background: #f0f0f0; }
    .google-btn:active { transform: scale(0.98); }
    .google-btn img { width: 22px; height: 22px; }

    .loading {
      display: none;
      font-size: 14px;
      color: #888;
      margin-top: 24px;
    }

    #app {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }

    .user-info {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .user-info p {
      color: #aaa;
      font-size: 14px;
      margin-top: 8px;
      line-height: 1.5;
    }

    #userName {
      font-size: 20px;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .login-box {
        padding: 32px 20px;
      }

      .logo {
        font-size: 22px;
      }

      .subtitle {
        margin-bottom: 32px;
      }

      #app {
        padding: 16px;
      }

      .user-info {
        padding: 16px;
      }
    }
    .help-text {
  margin-top: 16px;
  font-size: 13px;
  color: #999;
  line-height: 1.5;
}
  </style>
</head>
<body>

  <div class="login-box" id="loginBox">
    <div class="logo">보드앤미스터리</div>
    <div class="subtitle">보드게임 & 머더미스터리 커뮤니티</div>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Google로 로그인
    </button>
<div class="loading" id="loading">로그인 중...</div>
<p class="help-text">
  카카오톡/인스타 앱 내부 브라우저에서는 로그인이 안 될 수 있습니다.<br>
  Chrome 또는 Safari에서 열어주세요.
</p>
  </div>

  <div id="app">
    <div class="user-info">
      <div id="userName"></div>
      <p id="userEmail"></p>
      <p id="userStatus"></p>
    </div>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "boardnmystery.firebaseapp.com",
    projectId: "boardnmystery",
    storageBucket: "boardnmystery.firebasestorage.app",
    messagingSenderId: "210410925391",
    appId: "1:210410925391:web:deb17ddf62e72d507be93a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  function isInAppBrowser() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    return /KAKAOTALK|Instagram|FBAN|FBAV|Line|NAVER|Whale|wv/i.test(ua);
  }

  function showExternalBrowserGuide() {
    alert('현재 앱 내부 브라우저에서는 Google 로그인이 차단될 수 있습니다. 우측 상단 메뉴에서 "브라우저에서 열기" 또는 "Chrome/Safari로 열기" 후 다시 로그인해주세요.');
  }

  window.loginWithGoogle = async function() {
    document.getElementById('loading').style.display = 'block';

    if (isInAppBrowser()) {
      document.getElementById('loading').style.display = 'none';
      showExternalBrowserGuide();
      return;
    }

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    try {
      if (isMobile) {
        await signInWithRedirect(auth, provider);
      } else {
        await signInWithPopup(auth, provider);
      }
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      alert('로그인 실패: ' + e.message);
    }
  };

  getRedirectResult(auth).catch(e => {
    document.getElementById('loading').style.display = 'none';
    console.log(e);
  });

  onAuthStateChanged(auth, async (user) => {
    document.getElementById('loading').style.display = 'none';
    if (!user) return;

    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userName').textContent = user.displayName || '';
    document.getElementById('userEmail').textContent = user.email || '';

    try {
      const userRef = doc(db, 'users', user.uid);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        const data = userSnap.data();
        document.getElementById('userStatus').textContent =
          '등급: ' + (data.grade || '어색') + ' | 포인트: ' + (data.point || 0);
      } else {
        await setDoc(userRef, {
          uid: user.uid,
          email: user.email || '',
          nickname: user.displayName || '',
          grade: '어색',
          point: 0,
          warnCount: 0,
          joinDate: new Date().toISOString()
        });
        document.getElementById('userStatus').textContent = '등급: 어색 | 신규 가입 완료';
      }
    } catch (e) {
      console.log(e);
      document.getElementById('userStatus').textContent = '회원 정보를 불러오는 중 오류가 발생했습니다.';
    }
  });
</script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/boardnmystery_pwa/sw.js')
        .then(() => console.log('SW 등록 완료'))
        .catch(e => console.log('SW 등록 실패', e));
    }
  </script>

</body>
</html>
